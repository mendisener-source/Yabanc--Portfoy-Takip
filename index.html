<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shannon Snowball Terminal 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c0f; --surface: #111417; --card: #161a1f; --border: #252d38;
            --accent: #00e5ff; --green: #00ff88; --red: #ff3860;
            --text: #e0e8f0; --muted: #5a6a7a; --warn: #ff9500;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; padding: 10px; max-width: 900px; margin: auto; }
        
        /* Master Stats */
        .master-header { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--accent); margin-bottom: 12px; text-align: center; }
        .total-usd { font-size: 34px; font-family: 'Share Tech Mono'; color: var(--green); }
        .sub-stats { display: flex; justify-content: space-around; margin-top: 10px; font-size: 13px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 10px; }

        /* Grid & Tabs */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); font-weight: 700; color: var(--muted); }
        .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .asset-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }

        /* Snowball Card */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; position: relative; }
        .card.alert-buy { border: 2px solid var(--green); box-shadow: 0 0 15px rgba(0,255,136,0.1); }
        .card.alert-sell { border: 2px solid var(--red); box-shadow: 0 0 15px rgba(255,56,96,0.1); }
        
        .ticker-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .ticker-name { font-size: 20px; font-weight: 700; color: var(--accent); }
        
        /* Input Fields */
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .field { background: #000; border: 1px solid var(--border); border-radius: 4px; padding: 5px; color: var(--text); width: 100%; font-family: 'Share Tech Mono'; font-size: 13px; }
        .label { font-size: 9px; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; display: block; }

        /* Progress & Snowball Visual */
        .snow-track { height: 8px; background: #000; border-radius: 4px; margin: 15px 0 5px 0; overflow: hidden; position: relative; }
        .snow-bar { height: 100%; transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .target-line { position: absolute; top:0; height:100%; width:2px; background:#fff; z-index:5; }

        /* Signal Box */
        .signal { margin-top: 12px; padding: 10px; border-radius: 6px; text-align: center; font-weight: 700; font-size: 13px; letter-spacing: 1px; }
        .sig-buy { background: rgba(0,255,136,0.15); color: var(--green); border: 1px solid var(--green); }
        .sig-sell { background: rgba(255,56,96,0.15); color: var(--red); border: 1px solid var(--red); }
        .sig-ok { background: rgba(90,106,122,0.1); color: var(--muted); border: 1px solid var(--border); }

        .btn-main { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--accent); color: #000; font-weight: 700; cursor: pointer; margin-bottom: 15px; font-family: 'Rajdhani'; font-size: 16px; }
        
        .up { color: var(--green); } .down { color: var(--red); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="master-header">
        <div style="font-size:11px; color:var(--accent); letter-spacing:2px;">SNOWBALL TERMINAL VALUE</div>
        <div class="total-usd" id="total-usd">$0.00</div>
        <div class="sub-stats">
            <span id="total-pl">P/L: --</span>
            <span id="usd-rate">USD/TRY: --</span>
        </div>
    </div>

    <button class="btn-main" onclick="updateAll()">🔄 PİYASA VERİLERİNİ ÇEK & HESAPLA</button>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('p1', event)">PORTFÖY 1</div>
        <div class="tab" onclick="switchTab('p2', event)">PORTFÖY 2</div>
    </div>

    <div id="p1" class="portfolio-section asset-grid"></div>
    <div id="p2" class="portfolio-section asset-grid hidden"></div>

    <script>
        // --- DATA SETUP ---
        const CONFIG = {
            p1: [
                {t:'AMDG', target:20, sapma:2, lot:758, cost:25.98, color:'#00e5ff'},
                {t:'SPXL', target:20, sapma:2, lot:85, cost:164.67, color:'#ff6d00'},
                {t:'NVDU', target:20, sapma:2, lot:161, cost:103.82, color:'#00ff88'},
                {t:'TSLL', target:20, sapma:2, lot:1288, cost:15.95, color:'#ffd700'},
                {t:'TMF', target:20, sapma:2, lot:440, cost:40.63, color:'#a78bfa'}
            ],
            p2: [
                {t:'TEXU', target:20, sapma:3, lot:109, cost:24.81, color:'#00e5ff'},
                {t:'TTXU', target:20, sapma:3, lot:278, cost:21.39, color:'#ff6d00'},
                {t:'TSXU', target:20, sapma:3, lot:147, cost:31.75, color:'#00ff88'},
                {t:'TBXU', target:20, sapma:3, lot:142, cost:30.41, color:'#ffd700'},
                {t:'UGL', target:10, sapma:2, lot:40, cost:57.92, color:'#ffffff'},
                {t:'TYD', target:10, sapma:2, lot:92, cost:25.55, color:'#a78bfa'}
            ]
        };

        const FINNHUB_KEY = 'd722oopr01qjeeefm31gd722oopr01qjeeefm320';
        let livePrices = {};
        let usdTry = 32.50;

        // Yerel verileri yükle (Input değişikliklerini korur)
        let userStats = JSON.parse(localStorage.getItem('shn_user_stats')) || {};

        async function updateAll() {
            try {
                // Kur güncelle
                const ex = await fetch('https://open.er-api.com/v6/latest/USD').then(r => r.json());
                usdTry = ex.rates.TRY;
                document.getElementById('usd-rate').textContent = `USD/TRY: ${usdTry.toFixed(2)}`;

                // Fiyatları çek
                const tickers = [...CONFIG.p1, ...CONFIG.p2].map(a => a.t);
                const results = await Promise.all(tickers.map(t => 
                    fetch(`https://finnhub.io/api/v1/quote?symbol=${t}&token=${FINNHUB_KEY}`).then(r => r.json())
                ));
                results.forEach((res, i) => { if(res.c) livePrices[tickers[i]] = res.c; });

                render();
            } catch (e) { console.error(e); }
        }

        function render() {
            renderSection('p1', CONFIG.p1);
            renderSection('p2', CONFIG.p2);
            updateGlobalStats();
        }

        function renderSection(id, data) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            
            // Toplam Portföy Değeri Hesapla
            const totalVal = data.reduce((sum, a) => {
                const lot = userStats[`lot-${a.t}`] || a.lot;
                return sum + (lot * (livePrices[a.t] || a.cost));
            }, 0);

            data.forEach(a => {
                const currentLot = userStats[`lot-${a.t}`] || a.lot;
                const currentCost = userStats[`cost-${a.t}`] || a.cost;
                const price = livePrices[a.t] || currentCost;
                const value = currentLot * price;
                const weight = (value / totalVal) * 100;
                
                // Rebalancing Mantığı
                const diff = weight - a.target;
                const targetValue = totalVal * (a.target / 100);
                const tradeLots = Math.round((targetValue - value) / price);
                
                let sigClass = 'sig-ok', sigText = 'DENGEDE', alertClass = '';
                if (Math.abs(diff) > a.sapma) {
                    if (tradeLots > 0) { 
                        sigClass = 'sig-buy'; sigText = `AL: +${tradeLots} LOT`; alertClass = 'alert-buy';
                    } else { 
                        sigClass = 'sig-sell'; sigText = `SAT: ${Math.abs(tradeLots)} LOT`; alertClass = 'alert-sell';
                    }
                }

                container.innerHTML += `
                    <div class="card ${alertClass}">
                        <div class="ticker-head">
                            <span class="ticker-name">${a.t}</span>
                            <span style="font-family: 'Share Tech Mono';">$${price.toFixed(2)}</span>
                        </div>
                        
                        <div class="input-group">
                            <div>
                                <label class="label">Lot Miktarı</label>
                                <input type="number" class="field" value="${currentLot}" onchange="save('${a.t}', 'lot', this.value)">
                            </div>
                            <div>
                                <label class="label">Maliyet ($)</label>
                                <input type="number" class="field" value="${currentCost}" onchange="save('${a.t}', 'cost', this.value)">
                            </div>
                        </div>

                        <div class="weight-info" style="display:flex; justify-content:space-between; font-size:11px;">
                            <span>Ağırlık: %${weight.toFixed(1)}</span>
                            <span>Hedef: %${a.target}</span>
                        </div>

                        <div class="snow-track">
                            <div class="snow-bar" style="width:${Math.min(100, (weight/a.target)*100)}%; background:${a.color}"></div>
                            <div class="target-line" style="left:50%"></div>
                        </div>

                        <div class="signal ${sigClass}">${sigText}</div>
                    </div>
                `;
            });
        }

        function save(ticker, field, val) {
            userStats[`${field}-${ticker}`] = parseFloat(val);
            localStorage.setItem('shn_user_stats', JSON.stringify(userStats));
            render(); // Anında yeniden hesapla
        }

        function updateGlobalStats() {
            let total = 0, costTotal = 0;
            [...CONFIG.p1, ...CONFIG.p2].forEach(a => {
                const lot = userStats[`lot-${a.t}`] || a.lot;
                const cost = userStats[`cost-${a.t}`] || a.cost;
                total += (lot * (livePrices[a.t] || cost));
                costTotal += (lot * cost);
            });
            
            document.getElementById('total-usd').textContent = `$${total.toLocaleString('en-US', {minimumFractionDigits:2})}`;
            const pl = total - costTotal;
            const plPerc = (pl / costTotal) * 100;
            document.getElementById('total-pl').innerHTML = `P/L: <span class="${pl>=0?'up':'down'}">${pl>=0?'+':''}$${pl.toFixed(0)} (%${plPerc.toFixed(1)})</span>`;
        }

        function switchTab(id, e) {
            document.querySelectorAll('.portfolio-section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            e.currentTarget.classList.add('active');
        }

        window.onload = updateAll;
    </script>
</body>
</html>
